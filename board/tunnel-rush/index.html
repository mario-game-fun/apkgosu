<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
	<title>Tunnel Rush</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="mobile-web-app-capable" content="yes">

<meta name="robots" content="noindex, nofollow">

	<script src="https://www.apkgosu.fun/ad/sdk/codea.js"></script>
	<script src="https://www.apkgosu.fun/ad/sdk/sdk.js"></script>

	<style>
		html,
		body {
			width: 100%;
			height: 100%;
			padding: 0;
			margin: 0;
			overflow: hidden;
		}

		#renderCanvas {
			width: 100%;
			height: 100%;
			display: block;
			font-size: 0;

			-webkit-tap-highlight-color: transparent;
			-webkit-touch-callout: none;
			-webkit-user-select: none;
			-khtml-user-select: none;
			-moz-user-select: none;
			-ms-user-select: none;
			user-select: none;
		}

		#display728x90 {
			position: absolute;
			left: 0px;
			right: 0px;
			margin-left: auto;
			margin-right: auto;
			top: 20px;
 
			width: 728px;
			height: 90px;
			display: none;
		/*	background: #505050; */
		}

		#display320x50 {
			position: absolute;
			left: 0px;
			right: 0px;
			margin-left: auto;
			margin-right: auto;
			top: 10px;
 
			width: 320px;
			height: 50px;
			display: none;
		/*	background: #505050; */
		}
	</style>
</head>

<body>
	<canvas id="renderCanvas" touch-action="none"></canvas>

	<div id="display728x90"></div>
	<div id="display320x50"></div>

	<script src="main.js"></script>
</body>
</html>
